<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <rect x="2" y="2" width="76" height="76" rx="18" fill="none" stroke="#0f0f0f" stroke-width="3.5"/>
  <!-- Inner filled box -->
  <rect x="15" y="15" width="50" height="50" rx="12" fill="#0f0f0f"/>
  <!-- B mark -->
  <text x="40" y="51" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
  <!-- Wordmark: boom bold, brand light -->
  <text font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="54" letter-spacing="-1.6" fill="#0f0f0f">
    <tspan x="96" y="60" font-weight="700">boom</tspan><tspan font-weight="300">brand</tspan>
  </text>
</svg>
